name: Docker Image CI

on:
  push:
    branches: [ "master", "hotfix/*" ]
  pull_request:

permissions:
  contents: read
  packages: write   # push to ghcr.io/lookbehind

jobs:
  build:
    runs-on: mysnacks-ubuntu
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Log in to ghcr.io
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="${GITHUB_SHA:0:6}"
          echo "tag=${BRANCH}-${SHORT_SHA}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      # Dual-push during the Docker Hub -> ghcr migration: prod still references
      # Docker Hub, dev pulls ghcr. Drop the Docker Hub tag once prod is migrated.
      - name: Build and push container image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: |
            eisajanyan/nopcommerce:${{ steps.meta.outputs.tag }}
            ghcr.io/lookbehind/nopcommerce:${{ steps.meta.outputs.tag }}
          file: Dockerfile
          context: .
